name: Run Unit Tests

on:
  workflow_run:
    workflows: ["Code Validation"]
    types:
      - completed

env:
  TARGET_COMMIT: ${{ github.base_ref }}

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/workflows/actions/setup-composite
      - uses: ./.github/workflows/actions/install-composite
      - name: Run pytest
        run: |
          changed_python_files=$(git diff --diff-filter=d --name-only origin/${{ github.base_ref }}..HEAD | grep "\.py$" | grep -vE "config|examples|fabfile|manage.py|migrations|venv|build" | tr '\n' ' ' || true)
           if [ -n "$changed_python_files" ];then uv sync --group dev;else exit 0; fi
           uv run --group dev pytest -vv --cov="src" .
