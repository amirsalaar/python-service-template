name: Code Validation

on:
  pull_request:
    branches:
      - main

jobs:
  black-check:
    env:
      TARGET_COMMIT: ${{ github.base_ref }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - uses: actions/setup-python@v1
        with:
          python-version: "3.9"
      - name: Install and run black
        run: |
          files=$(git diff --diff-filter=d --name-only origin/$TARGET_COMMIT..HEAD | grep "\.py$" | grep -vE "config|examples|fabfile|manage.py|migrations|venv|build" | tr '\n' ' ' || true)
          if [ -n "$files" ];then pip3 install poetry && poetry config virtualenvs.create false && poetry install --only black;else exit 0; fi
          black --check -v --config ${{ github.workspace }}/pyproject.toml $files
  isort-check:
    env:
      TARGET_COMMIT: ${{ github.base_ref }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - uses: actions/setup-python@v1
        with:
          python-version: "3.9"
      - name: Install and run isort
        run: |
          files=$(git diff --diff-filter=d --name-only origin/$TARGET_COMMIT..HEAD | grep "\.py$" | grep -vE "config|examples|fabfile|manage.py|migrations|venv|build" | tr '\n' ' ' || true)
          if [ -n "$files" ];then pip3 install poetry && poetry config virtualenvs.create false && poetry install --only isort;else exit 0; fi
          isort -v --check --profile black --settings-path ${{ github.workspace }}/pyproject.toml --atomic $files
