repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-yaml
        log_file: logs/pre-commit.log
      - id: end-of-file-fixer
        log_file: logs/pre-commit.log
      - id: trailing-whitespace
        log_file: logs/pre-commit.log
      - id: check-json
        log_file: logs/pre-commit.log
      - id: check-ast
      - id: check-toml

  - repo: https://github.com/asottile/add-trailing-comma
    rev: v2.4.0
    hooks:
      - id: add-trailing-comma

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run --group ruff ruff format --check
        language: system
        types: [python]
      - id: ruff-check
        name: ruff check
        entry: uv run --group ruff ruff check
        language: system
        types: [python]
      - id: mypy
        name: Validate types with MyPy
        entry: uv run --group mypy mypy --config-file pyproject.toml .
        language: system
        types: [python]
        pass_filenames: false
